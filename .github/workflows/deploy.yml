name: CI/CD → Test → Deploy to EC2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Stage 1: Test Backend ────────────────────────────────────────
  test-backend:
    name: "🧪 Backend Tests"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── Stage 2: Test Frontend Build ─────────────────────────────────
  test-frontend:
    name: "🎨 Frontend Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Build frontend
        run: cd ui && npm run build
        env:
          VITE_API_URL: http://localhost:8000
          VITE_WS_URL: ws://localhost:8000/ws/live

  # ── Stage 3: Docker Build ────────────────────────────────────────
  test-docker:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: [test-backend]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t propedge-backend:test .

      - name: Verify container starts
        run: |
          docker run -d --name test-backend \
            -p 8000:8000 \
            -e PROPEDGE_ENV=production \
            propedge-backend:test

          echo "Waiting for container startup..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "✅ Health check passed!"
              curl -s http://localhost:8000/api/health | python3 -m json.tool
              exit 0
            fi
            echo "  Attempt $i/60..."
            sleep 2
          done

          echo "❌ Health check failed"
          docker logs test-backend
          exit 1

  # ── Stage 4: Deploy to EC2 ───────────────────────────────────────
  deploy:
    name: "🚀 Deploy to EC2"
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "=== PropEdge Deploy Starting ==="
            cd /opt/propedge/src

            # Pull latest code
            git pull origin main

            # Build new image
            sudo docker build -t propedge-backend .

            # Stop old container
            sudo docker stop propedge-backend 2>/dev/null || true
            sudo docker rm propedge-backend 2>/dev/null || true

            # Start new container
            sudo docker run -d \
              --name propedge-backend \
              -p 8000:8000 \
              -v /opt/propedge/data:/data \
              -v /opt/propedge/src/configs:/app/configs:ro \
              -e PROPEDGE_ENV=production \
              --restart always \
              propedge-backend

            # Wait for health check
            echo "Waiting for health check..."
            for i in $(seq 1 60); do
              if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
                echo "✅ Deploy successful!"
                curl -s http://localhost:8000/api/health
                exit 0
              fi
              sleep 2
            done

            echo "❌ Health check failed after deploy"
            sudo docker logs propedge-backend --tail 30
            exit 1

      - name: Verify external access
        if: success()
        run: |
          echo "Verifying external access..."
          sleep 5
          curl -sf --connect-timeout 10 http://${{ secrets.EC2_HOST }}:8000/api/health || echo "⚠️ External access check skipped (may need security group update)"
